# Build and publish anndataoom wheels.
#
# On tag push (v*.*.*): builds wheels for Linux/macOS/Windows × CPython 3.9-3.13
# and publishes them to PyPI via trusted publishing (OIDC — no API token needed).
#
# Requires: in PyPI, register 'anndataoom' under a trusted publisher pointing to
# this repo + this workflow file. See https://docs.pypi.org/trusted-publishers/

name: Release

on:
  push:
    tags: ['v*']
  # Also allow manual runs + PRs (for testing, but skip publish)
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "python/**"
      - "Cargo.toml"
      - "pyproject.toml"
      - ".github/workflows/release.yml"

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Linux x86_64 + aarch64  (manylinux)
  # ──────────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # macOS x86_64 + arm64 (universal2 also possible; keeping separate for speed)
  # ──────────────────────────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Windows x86_64
  # ──────────────────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          architecture: ${{ matrix.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Source distribution (for architectures without wheels)
  # ──────────────────────────────────────────────────────────────────────
  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  # ──────────────────────────────────────────────────────────────────────
  # Publish to PyPI (only on tag pushes)
  # ──────────────────────────────────────────────────────────────────────
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos, windows, sdist]
    environment:
      name: pypi
      url: https://pypi.org/p/anndataoom
    permissions:
      id-token: write   # For trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # trusted publisher — no token needed
